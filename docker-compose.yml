services:
  redis:
    image: redis/redis-stack-server:latest
    container_name: redis-server
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    volumes:
      - redis_data:/data

  inventory:
    build: ./inventory
    ports:
      - "8000:8000"
    env_file:
      - ./inventory/.env
    depends_on:
      redis:
        condition: service_healthy

  payment:
    build: ./payment
    ports:
      - "8001:8000"
    env_file:
      - ./payment/.env
    depends_on:
      redis:
        condition: service_healthy
      inventory:
        condition: service_started

  inventory_consumer:
    build: ./inventory
    command: python consumer.py
    env_file:
      - ./inventory/.env
    depends_on:
      redis:
        condition: service_healthy

  payment_consumer:
    build: ./payment
    command: python consumer.py
    env_file:
      - ./payment/.env
    depends_on:
      redis:
        condition: service_healthy

  notification:
    build: ./notification
    environment:
      - REDIS_HOST=redis
    depends_on:
      redis:
        condition: service_healthy

volumes:
  redis_data: